<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TwinPeak | {% block title %}{% endblock title %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    {% block extra_style %}{% endblock extra_style %}
    <!-- Inter CDN -->
    <link rel="stylesheet" href="https://rsms.me">

    <!-- Clash Display CDN -->
    <link href="https://fontshare.com[]=clash-display@400,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/main.css">
  </head>
  <body class="d-flex flex-column min-vh-100">
    <!-- navbar -->
     <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand font-clash fw-bold " href="/"><h2>TwinPeaks</h2></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" aria-current="page" href="/"><h5>Home</h5></a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url "services" %}"><h5>Services</h5></a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url "howwework" %}"><h5>How We Work</h5></a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url "insights" %}"><h5>Insights</h5></a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url "aboutus" %}"><h5>About Us</h5></a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url "workwithus" %}"><h5>[ Work With Us ]</h5></a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container flex-grow-1">
      {% block page %}
      {% endblock page %}
    </div>
    <!-- Footer  -->
     <footer class="bg-dark text-white py-3 mt-auto">
        <div class="row px-3">
          <div class="col text-start">
            <p class="mb-0">&copy; 2026 TwinPeaks. All rights reserved.</p>
          </div>
          <div class="col text-end">
            <p class="mb-0">Made by <a href="http://www.codigoaldea.com" class="text-decoration-none text-reset">@CodigoAldea</a></p>
          </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
